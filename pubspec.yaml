name: neuebrandenbook_chat
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  connectivity_plus: ^7.1.1
  flutter:
    sdk: flutter
  get: ^4.7.3
  http: ^1.6.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
  - assets/fonts/Noto-Sans/
  - assets/fonts/Noto-Sans/static/
  - assets/images/Icons/
  fonts:
  - family: NotoSans
  - fonts:
    - asset: assets/fonts/Noto-Sans/static/NotoSans-Regular.ttf
    - asset: assets/fonts/Noto-Sans/static/NotoSans-Bold.ttf
      weight: 700
   
